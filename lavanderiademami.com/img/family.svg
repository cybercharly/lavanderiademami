<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Trato familiar">
  <style>
    .heart { transform-box: fill-box; transform-origin: 50px 40px; animation: lift 2.6s ease-in-out infinite; }
    @keyframes lift { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-6px) scale(1.06); } }
    .hand { transform-box: fill-box; transform-origin: 50px 70px; animation: cradle 2.6s ease-in-out infinite; }
    @keyframes cradle { 0%,100% { transform: translateY(0); } 50% { transform: translateY(2px); } }
    @media (prefers-reduced-motion: reduce){ .heart,.hand{ animation:none; } }
  </style>

  <!-- floating heart -->
  <g class="heart">
    <path d="M50 52 C36 42 35 30 44 26 C49 24 50 28 50 30 C50 28 51 24 56 26 C65 30 64 42 50 52 Z"
          fill="#E57399" stroke="#C24A75" stroke-width="3.5" stroke-linejoin="round"/>
  </g>

  <!-- cradling open hand -->
  <g class="hand">
    <path d="M22 60 q4 18 28 18 q24 0 28 -18" fill="none" stroke="#1C4475" stroke-width="5" stroke-linecap="round"/>
    <path d="M22 60 q-3 -8 3 -10 M78 60 q3 -8 -3 -10" fill="none" stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>
    <!-- fingers -->
    <path d="M34 62 v-9 M44 64 v-10 M56 64 v-10 M66 62 v-9" stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
