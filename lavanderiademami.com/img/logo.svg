<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="La Lavandería de Mami">
  <style>
    /* Rising soap bubbles */
    .bub { transform-box: fill-box; transform-origin: center; }
    .b1 { animation: rise 3.4s ease-in-out infinite; }
    .b2 { animation: rise 4.2s ease-in-out infinite 0.6s; }
    .b3 { animation: rise 3.0s ease-in-out infinite 1.1s; }
    .b4 { animation: rise 4.8s ease-in-out infinite 0.3s; }
    @keyframes rise {
      0%   { transform: translateY(0) scale(0.7); opacity: 0; }
      20%  { opacity: 1; }
      75%  { opacity: 0.85; }
      100% { transform: translateY(-46px) scale(1.18); opacity: 0; }
    }
    /* Clothes peeking out, gently swaying */
    .cloth { transform-box: fill-box; transform-origin: bottom center; }
    .c1 { animation: sway 3.2s ease-in-out infinite; }
    .c2 { animation: sway 3.8s ease-in-out infinite 0.4s; }
    .c3 { animation: sway 2.8s ease-in-out infinite 0.8s; }
    @keyframes sway {
      0%, 100% { transform: rotate(-3.5deg); }
      50%      { transform: rotate(3.5deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .bub, .cloth { animation: none; }
    }
  </style>

  <defs>
    <!-- light, clean background so colored elements pop -->
    <radialGradient id="bgGrad" cx="40%" cy="34%" r="78%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#EAF4FE"/>
      <stop offset="100%" stop-color="#CDE5F7"/>
    </radialGradient>
  </defs>

  <!-- Soft round background -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#A78BFA" stroke-width="4" stroke-opacity="0.6"/>

  <!-- Rising soap bubbles: translucent fill + colored rim + highlight = visible on any background -->
  <g class="bub b1">
    <circle cx="50" cy="118" r="7" fill="#1C4475" fill-opacity="0.12" stroke="#1C4475" stroke-width="2"/>
    <circle cx="47.5" cy="115" r="1.8" fill="#FFFFFF"/>
  </g>
  <g class="bub b2">
    <circle cx="152" cy="116" r="9" fill="#A78BFA" fill-opacity="0.22" stroke="#7C5BD0" stroke-width="2"/>
    <circle cx="149" cy="112.5" r="2.2" fill="#FFFFFF"/>
  </g>
  <g class="bub b3">
    <circle cx="134" cy="120" r="6" fill="#E57399" fill-opacity="0.22" stroke="#D45A84" stroke-width="2"/>
    <circle cx="132" cy="117.5" r="1.6" fill="#FFFFFF"/>
  </g>
  <g class="bub b4">
    <circle cx="64" cy="114" r="5" fill="#2F5A93" fill-opacity="0.16" stroke="#2F5A93" stroke-width="1.8"/>
    <circle cx="62.5" cy="112" r="1.4" fill="#FFFFFF"/>
  </g>

  <!-- Clothes peeking out of the basket (each with a crisp darker outline) -->
  <g>
    <!-- pink shirt -->
    <path class="cloth c1" d="M66 118 q-11 -20 8 -28 q6 7 13 0 q19 7 7 28 z" fill="#E57399" stroke="#C24A75" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- lavender garment -->
    <path class="cloth c2" d="M92 116 q-7 -24 13 -28 q21 4 13 28 z" fill="#A78BFA" stroke="#7C5BD0" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- blue striped towel -->
    <g class="cloth c3">
      <rect x="118" y="92" width="20" height="28" rx="5" fill="#2F5A93" stroke="#1C4475" stroke-width="2.5"/>
      <rect x="118" y="101" width="20" height="5" fill="#EAF4FE"/>
    </g>
  </g>

  <!-- Feminine bow on the rim -->
  <g>
    <path d="M148 116 l12 -7 a3.5 3.5 0 0 1 5 3.5 l-2.5 10 a3.5 3.5 0 0 1 -5 1.5 z" fill="#E57399" stroke="#C24A75" stroke-width="1.5"/>
    <path d="M148 116 l12 7 a3.5 3.5 0 0 0 5 -3.5 l-2.5 -10 a3.5 3.5 0 0 0 -5 -1.5 z" fill="#E57399" stroke="#C24A75" stroke-width="1.5"/>
    <circle cx="150" cy="116" r="4" fill="#D45A84"/>
  </g>

  <!-- ===== WICKER BASKET = THE LADY ===== -->
  <g>
    <!-- basket body (brown wicker) -->
    <path d="M48 122 h104 l-10 50 a9 9 0 0 1 -9 6 H67 a9 9 0 0 1 -9 -6 z" fill="#C68A4E"/>
    <path d="M48 122 h104 l-10 50 a9 9 0 0 1 -9 6 H67 a9 9 0 0 1 -9 -6 z" fill="none" stroke="#8A5A28" stroke-width="4" stroke-linejoin="round"/>

    <!-- woven texture: horizontal bands -->
    <path d="M53 140 h94 M55 158 h90 M58 174 h84" stroke="#8A5A28" stroke-width="2.5" stroke-opacity="0.55" fill="none"/>
    <!-- woven texture: vertical strokes -->
    <path d="M70 124 l-3 56 M90 124 l-2 56 M110 124 l1 56 M130 124 l3 56"
          stroke="#8A5A28" stroke-width="2.5" stroke-opacity="0.4" fill="none"/>
    <!-- light highlights for weave -->
    <path d="M53 132 h94 M55 149 h90 M57 166 h86" stroke="#E2B57E" stroke-width="2" stroke-opacity="0.6" fill="none"/>

    <!-- rim (woven, brown) -->
    <rect x="42" y="114" width="116" height="14" rx="7" fill="#B0763C"/>
    <rect x="42" y="114" width="116" height="14" rx="7" fill="none" stroke="#8A5A28" stroke-width="3"/>
    <path d="M50 121 h100" stroke="#E2B57E" stroke-width="2" stroke-opacity="0.6"/>

    <!-- ===== FACE ===== -->
    <!-- rosy cheeks (chapetes) -->
    <circle cx="74"  cy="156" r="9" fill="#E57399" fill-opacity="0.55"/>
    <circle cx="126" cy="156" r="9" fill="#E57399" fill-opacity="0.55"/>

    <!-- half-closed sleepy eyes (ojos entrecerrados) -->
    <!-- left -->
    <path d="M82 148 a9 7 0 0 1 18 0" fill="#5A3A1A"/>
    <path d="M82 148 a9 7 0 0 1 18 0" fill="none" stroke="#5A3A1A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M82 148 q9 6 18 0" fill="#3A2410"/>
    <!-- left eyelashes -->
    <path d="M82 148 l-4.5 -1.5 M86 145 l-3 -3.5 M91 143.5 l-1 -4" stroke="#3A2410" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- right -->
    <path d="M100 148 a9 7 0 0 1 18 0" fill="#5A3A1A"/>
    <path d="M100 148 a9 7 0 0 1 18 0" fill="none" stroke="#5A3A1A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M100 148 q9 6 18 0" fill="#3A2410"/>
    <!-- right eyelashes -->
    <path d="M118 148 l4.5 -1.5 M114 145 l3 -3.5 M109 143.5 l1 -4" stroke="#3A2410" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- sweet smile -->
    <path d="M88 166 q12 11 24 0" stroke="#5A3A1A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
