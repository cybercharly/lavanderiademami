<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Convenios para negocios">
  <style>
    .case { transform-box: fill-box; transform-origin: 50px 60px; animation: bob 3.2s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .check { transform-box: fill-box; transform-origin: center; animation: pop 2.4s ease-in-out infinite; }
    @keyframes pop { 0%,100% { transform: scale(.5); opacity:.3; } 50% { transform: scale(1); opacity:1; } }
    @media (prefers-reduced-motion: reduce){ .case,.check{ animation:none; } }
  </style>

  <g class="case">
    <!-- handle -->
    <path d="M40 38 q0 -10 10 -10 q10 0 10 10" fill="none" stroke="#1C4475" stroke-width="4" stroke-linecap="round"/>
    <!-- body -->
    <rect x="24" y="38" width="52" height="38" rx="6" fill="#2F5A93" stroke="#1C4475" stroke-width="3.5"/>
    <!-- latch band -->
    <rect x="24" y="50" width="52" height="8" fill="#1C4475" fill-opacity="0.35"/>
    <rect x="44" y="49" width="12" height="10" rx="2" fill="#CDE5F7" stroke="#1C4475" stroke-width="2"/>
  </g>

  <!-- approval sparkle/check -->
  <g class="check">
    <circle cx="76" cy="32" r="11" fill="#E57399"/>
    <path d="M71 32 l4 4 7 -8" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
