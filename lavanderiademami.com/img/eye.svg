<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Visión">
  <style>
    .lid { transform-box: fill-box; transform-origin: 50px 50px; animation: blink 4s ease-in-out infinite; }
    @keyframes blink { 0%,90%,100% { transform: scaleY(1); } 95% { transform: scaleY(0.08); } }
    .iris { transform-box: fill-box; transform-origin: 50px 50px; animation: look 5s ease-in-out infinite; }
    @keyframes look { 0%,100% { transform: translateX(-4px); } 50% { transform: translateX(4px); } }
    @media (prefers-reduced-motion: reduce){ .lid,.iris{ animation:none; } }
  </style>

  <g class="lid">
    <!-- eye almond -->
    <path d="M16 50 q34 -32 68 0 q-34 32 -68 0 z" fill="#EAF4FE" stroke="#1C4475" stroke-width="4" stroke-linejoin="round"/>
    <!-- iris -->
    <g class="iris">
      <circle cx="50" cy="50" r="14" fill="#A78BFA" stroke="#7C5BD0" stroke-width="3"/>
      <circle cx="50" cy="50" r="6" fill="#1C4475"/>
      <circle cx="46" cy="46" r="2.4" fill="#fff"/>
    </g>
  </g>
  <!-- top lash accents -->
  <path d="M22 38 l-5 -4 M50 30 l0 -6 M78 38 l5 -4" stroke="#1C4475" stroke-width="3" stroke-linecap="round"/>
</svg>
