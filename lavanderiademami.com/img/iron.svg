<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Planchado">
  <style>
    .steam { transform-box: fill-box; transform-origin: bottom center; }
    .t1 { animation: puff 2.4s ease-in-out infinite; }
    .t2 { animation: puff 2.4s ease-in-out infinite .5s; }
    .t3 { animation: puff 2.4s ease-in-out infinite 1s; }
    @keyframes puff {
      0%   { opacity: 0; transform: translateY(4px) scaleY(.8); }
      35%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-18px) scaleY(1.1); }
    }
    .iron { transform-box: fill-box; transform-origin: 52px 70px; animation: glide 3s ease-in-out infinite; }
    @keyframes glide { 0%,100% { transform: translateX(-4px); } 50% { transform: translateX(4px); } }
    .shadow { transform-box: fill-box; transform-origin: center; animation: sh 3s ease-in-out infinite; }
    @keyframes sh { 0%,100% { transform: scaleX(1); opacity:.16; } 50% { transform: scaleX(1.12); opacity:.10; } }
    @media (prefers-reduced-motion: reduce){ .steam,.iron,.shadow{ animation:none; } }
  </style>

  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5A86BE"/>
      <stop offset="45%" stop-color="#2F5A93"/>
      <stop offset="100%" stop-color="#183a63"/>
    </linearGradient>
    <linearGradient id="soleG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3E6AA5"/>
      <stop offset="55%" stop-color="#1C4475"/>
      <stop offset="100%" stop-color="#0f2c4d"/>
    </linearGradient>
    <linearGradient id="handleG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F6B9CF"/>
      <stop offset="100%" stop-color="#D45A84"/>
    </linearGradient>
    <radialGradient id="tankG" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#EDE7FE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </radialGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse class="shadow" cx="50" cy="83" rx="34" ry="4.5" fill="#1C4475"/>

  <!-- rising steam -->
  <g fill="none" stroke-width="4.5" stroke-linecap="round">
    <path class="steam t1" d="M34 38 q-6 -7 0 -14 q6 -7 0 -14" stroke="#A78BFA"/>
    <path class="steam t2" d="M50 40 q-6 -7 0 -14 q6 -7 0 -14" stroke="#E57399"/>
    <path class="steam t3" d="M66 38 q-6 -7 0 -14 q6 -7 0 -14" stroke="#CDE5F7"/>
  </g>

  <g class="iron">
    <!-- sole plate (with depth) -->
    <path d="M12 72 Q14 63 34 61 L74 59 Q86 59 85 68 Q84 74 76 74 L18 74 Q12 74 12 72 Z"
          fill="url(#soleG)" stroke="#0f2c4d" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- sole front lip highlight -->
    <path d="M14 70 Q16 64 34 62 L74 60" fill="none" stroke="#8FB6E4" stroke-width="2.5" stroke-linecap="round" opacity=".75"/>
    <!-- sole bottom shine -->
    <path d="M20 73 H74" stroke="#0a2137" stroke-width="2" opacity=".5"/>

    <!-- body / cover (domed, volumetric) -->
    <path d="M28 62 Q30 45 52 43 L74 46 Q86 48 82 60 L80 62 Z"
          fill="url(#bodyG)" stroke="#12335a" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- top-left glossy highlight -->
    <path d="M36 52 Q44 47 56 48" fill="none" stroke="#BBD3F0" stroke-width="3.5" stroke-linecap="round" opacity=".65"/>
    <!-- rim between body and sole -->
    <path d="M28 61 H82" stroke="#0f2c4d" stroke-width="2" opacity=".5"/>

    <!-- water tank window -->
    <ellipse cx="44" cy="60" rx="8" ry="5.5" fill="url(#tankG)" stroke="#7C5BD0" stroke-width="1.8"/>
    <ellipse cx="41.5" cy="58" rx="2.4" ry="1.6" fill="#FFFFFF" opacity=".85"/>

    <!-- handle (3D tube: dark base + gradient top + highlight) -->
    <path d="M38 47 Q52 30 72 45" fill="none" stroke="#B84C74" stroke-width="10" stroke-linecap="round"/>
    <path d="M38 47 Q52 30 72 45" fill="none" stroke="url(#handleG)" stroke-width="6.5" stroke-linecap="round"/>
    <path d="M42 44 Q53 33 68 44" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity=".6"/>
    <!-- handle posts -->
    <rect x="36" y="45" width="6" height="9" rx="3" fill="#183a63"/>
    <rect x="68" y="44" width="6" height="9" rx="3" fill="#183a63"/>
  </g>
</svg>
