<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Planchado">
  <style>
    .steam { transform-box: fill-box; transform-origin: bottom center; }
    .t1 { animation: puff 2.4s ease-in-out infinite; }
    .t2 { animation: puff 2.4s ease-in-out infinite .5s; }
    .t3 { animation: puff 2.4s ease-in-out infinite 1s; }
    @keyframes puff {
      0%   { opacity: 0; transform: translateY(4px) scaleY(.8); }
      35%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-18px) scaleY(1.1); }
    }
    .iron { transform-box: fill-box; transform-origin: 52px 70px; animation: glide 3s ease-in-out infinite; }
    @keyframes glide { 0%,100% { transform: translateX(-4px); } 50% { transform: translateX(4px); } }
    @media (prefers-reduced-motion: reduce) { .steam, .iron { animation: none; } }
  </style>

  <!-- rising steam -->
  <g fill="none" stroke-width="4" stroke-linecap="round">
    <path class="steam t1" d="M36 40 q-6 -7 0 -14 q6 -7 0 -14" stroke="#A78BFA"/>
    <path class="steam t2" d="M52 42 q-6 -7 0 -14 q6 -7 0 -14" stroke="#E57399"/>
    <path class="steam t3" d="M68 40 q-6 -7 0 -14 q6 -7 0 -14" stroke="#CDE5F7"/>
  </g>

  <!-- iron -->
  <g class="iron">
    <!-- sole plate -->
    <path d="M22 76 H80 a4 4 0 0 0 4 -4 c0 -14 -16 -18 -34 -18 -12 0 -26 5 -30 14 a5 5 0 0 0 2 8 z"
          fill="#1C4475" stroke="#15375f" stroke-width="3" stroke-linejoin="round"/>
    <!-- body top -->
    <path d="M30 54 q4 -10 18 -12 l26 4 a4 4 0 0 1 3 6 l-4 8 z" fill="#2F5A93" stroke="#15375f" stroke-width="3" stroke-linejoin="round"/>
    <!-- handle -->
    <path d="M40 44 q14 -10 28 -2" stroke="#E57399" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- water indicator -->
    <circle cx="46" cy="66" r="3" fill="#A78BFA"/>
  </g>

  <!-- base shadow line -->
  <line x1="18" y1="82" x2="86" y2="82" stroke="#CDE5F7" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
</svg>
